<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox VE 虚拟机应用信息</title>
    <link rel="stylesheet" href="/css/element-plus.css">
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .custom-tabs-label {
            display: flex;
            flex-direction: column;
            gap: 0px;
            width: 100%;
        }

        .vm-label-top {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.4;
        }

        .vm-label-name {
            font-weight: 500;
            font-size: 13px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vm-label-description {
            font-size: 11px;
            color: #909399;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            margin-top: 1px;
        }

        .section-title {
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 500;
        }

        /* 方形样式 */
        .el-input__wrapper,
        .el-textarea__inner,
        .el-select .el-input__wrapper,
        .el-select .el-input,
        .el-select .el-input__inner,
        .el-button,
        .el-message-box,
        .el-select-dropdown,
        .el-popper {
            border-radius: 0 !important;
        }

        /* 强制所有element-plus组件方形 */
        * {
            border-radius: 0 !important;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            cursor: pointer;
            font-size: 20px;
            color: #606266;
            transition: color 0.3s;
        }

        .header-icon:hover {
            color: #409eff;
        }

        .edit-mode-icon.active {
            color: #67c23a;
        }

        .settings-icon:hover {
            color: #409eff;
        }

        /* 外层主容器不需要padding */
        #app > .el-container > .el-main {
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div id="app">
    <el-container style="height: 100vh; overflow: hidden;">
        <el-header style="font-size: 20px; display: flex; align-items: center">
            Proxmox VE 虚拟机应用信息
            <div class="header-right">
                <el-icon :class="['header-icon', 'settings-icon']" @click="showSettingsDialog" title="设置">
                    <Setting/>
                </el-icon>
                <el-icon :class="['header-icon', 'edit-mode-icon', { active: editMode }]" @click="toggleEditMode" title="编辑模式">
                    <Edit/>
                </el-icon>
            </div>
        </el-header>
        <el-main>
            <el-alert v-if="errorMessage" :title="errorMessage" type="error" :closable="false"
                      style="margin-bottom: 20px"></el-alert>

            <el-empty v-if="!errorMessage && allItems.length === 0" description="暂无数据"></el-empty>

            <!-- 左侧菜单 + 主内容区域 -->
            <el-container v-if="!errorMessage && allItems.length > 0" style="height: 100%;">
                <!-- 左侧菜单 -->
                <el-aside width="280px" style="border-right: 1px solid #e4e7ed;">
                    <el-scrollbar style="height: 100%;">
                        <el-menu :default-active="activeTab" @select="handleTabChange" style="border-right: none;">
                            <el-menu-item v-for="item in allItems"
                                          :key="item.type === 'host' ? `host-${item.node}` : item.vmid"
                                          :index="item.type === 'host' ? `host-${item.node}` : String(item.vmid)"
                                          style="height: auto; min-height: 56px; padding: 0; display: flex; align-items: center;">
                                <div class="custom-tabs-label" style="padding: 8px 15px; width: 100%;">
                                    <div class="vm-label-top">
                                        <div class="vm-label-name">{{ item.type === 'host' ? item.node : item.name }}</div>
                                        <el-tag v-if="item.status === 'running' || item.status === 'online'" type="success" size="small">{{ item.status }}</el-tag>
                                        <el-tag v-else-if="item.status === 'stopped'" type="info" size="small">{{ item.status }}</el-tag>
                                        <el-tag v-else type="danger" size="small">{{ item.status }}</el-tag>
                                    </div>
                                    <div class="vm-label-description" v-if="showDescription && item.description">{{ item.description }}</div>
                                </div>
                            </el-menu-item>
                        </el-menu>
                    </el-scrollbar>
                </el-aside>

                <!-- 主内容区域 -->
                <el-main style="overflow-y: auto;" :key="activeTab">
                    <!-- 宿主机信息 -->
                    <template v-if="currentItem && currentItem.type === 'host'">
                        <el-descriptions title="宿主机信息" :column="4">
                        <el-descriptions-item label="节点名称">{{ currentItem.node }}</el-descriptions-item>
                        <el-descriptions-item label="状态">
                            <el-tag v-if="currentItem.status === 'online'" type="success">{{ currentItem.status }}</el-tag>
                            <el-tag v-else type="danger">{{ currentItem.status }}</el-tag>
                        </el-descriptions-item>
                        <el-descriptions-item label="CPU核心数">{{ currentItem.cpus }} 核</el-descriptions-item>
                        <el-descriptions-item label="CPU使用率">{{ currentItem.cpuUsageFormatted }}
                        </el-descriptions-item>
                        <el-descriptions-item label="内存使用">{{ currentItem.memFormatted }} / {{ currentItem.maxmemFormatted }} GB
                        </el-descriptions-item>
                        <el-descriptions-item label="内存使用率">{{ currentItem.memUsageFormatted }}
                        </el-descriptions-item>
                        <el-descriptions-item label="运行时长" :span="2">{{ currentItem.uptimeFormatted }}
                        </el-descriptions-item>
                        <el-descriptions-item label="备注" >{{ currentItem.description }}
                        </el-descriptions-item>
                    </el-descriptions>

                    <!-- 存储信息 -->
                    <div class="section-title" style="margin-top: 20px;">存储信息</div>
                    <el-table :data="currentItem.storages" style="width: 100%;">
                        <el-table-column label="存储名称" prop="storage"></el-table-column>
                        <el-table-column label="类型" width="100px" prop="type"></el-table-column>
                        <el-table-column label="内容类型" width="250px" prop="content"></el-table-column>
                        <el-table-column label="状态">
                            <template #default="scope">
                                <el-tag v-if="scope.row.active === 1" type="success">活动</el-tag>
                                <el-tag v-else type="info">非活动</el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column label="已使用">
                            <template #default="scope">
                                {{ scope.row.usedFormatted }} GB
                            </template>
                        </el-table-column>
                        <el-table-column label="总容量">
                            <template #default="scope">
                                {{ scope.row.totalFormatted }} GB
                            </template>
                        </el-table-column>
                        <el-table-column label="可用">
                            <template #default="scope">
                                {{ scope.row.availFormatted }} GB
                            </template>
                        </el-table-column>
                        <el-table-column label="使用率">
                            <template #default="scope">
                                {{ scope.row.usageFormatted }}
                            </template>
                        </el-table-column>
                    </el-table>

                    <!-- 说明 -->
                    <div v-if="editMode || currentExplain">
                        <div class="section-title">说明</div>
                        <div v-if="!editMode" style="padding: 10px; background: #ffffff; min-height: 100px; white-space: pre-wrap; font-size: 13px;">
                            {{ currentExplain }}
                        </div>
                        <el-input
                                v-else
                                v-model="currentExplain"
                                type="textarea"
                                :rows="4"
                                placeholder="请输入宿主机说明"
                                @blur="saveExplain(currentItem.node, 'host')"
                        ></el-input>
                    </div>

                    <!-- 连接信息 -->
                    <div class="section-title">
                        连接信息
                        <el-button v-if="editMode" type="primary"  @click="addConnection" style="margin-left: 10px">
                            添加连接
                        </el-button>
                    </div>
                    <el-table :data="connections" style="width: 100%;"
                              @cell-mouse-enter="(row, column, cell, event) => { if (column.property === 'password') hoveredRowId = connections.indexOf(row); }"
                              @cell-mouse-leave="(row, column, cell, event) => { if (column.property === 'password') hoveredRowId = null; }">
                        <el-table-column label="名称" width="200px" prop="name">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.name || '-' }}</span>
                                <el-input v-else v-model="scope.row.name" ></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="类型" width="100px" prop="connType">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.connType || '-' }}</span>
                                <el-select v-else v-model="scope.row.connType" placeholder="请选择" @change="handleTypeChange(scope.row)">
                                    <el-option label="RDP" value="rdp"></el-option>
                                    <el-option label="SSH" value="ssh"></el-option>
                                    <el-option label="SMB" value="smb"></el-option>
                                    <el-option label="链接" value="link"></el-option>
                                    <el-option label="其他" value="other"></el-option>
                                </el-select>
                            </template>
                        </el-table-column>
                        <el-table-column label="地址" width="300px" prop="address">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.address || '-' }}</span>
                                <el-input v-else v-model="scope.row.address"
                                          @blur="validateIP(scope.row)"></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="端口" width="100px" prop="port">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.port || '-' }}</span>
                                <el-input v-else v-model.number="scope.row.port"
                                          :disabled="scope.row.connType === 'smb'"
                                          @blur="validatePort(scope.row)"></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="用户名" prop="username">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.username || '-' }}</span>
                                <el-input v-else v-model="scope.row.username" ></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="密码" prop="password">
                            <template #default="scope">
                                <span v-if="!editMode">
                                    <span v-if="hoveredRowId === scope.$index">{{ scope.row.password || '-' }}</span>
                                    <span v-else>{{ scope.row.password ? '******' : '-' }}</span>
                                </span>
                                <el-input v-else v-model="scope.row.password" ></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="快捷连接" width="150px">
                            <template #default="scope">
                                <el-button v-if="scope.row.connType === 'rdp'" type="primary" size="small" @click="downloadRDP(currentItem, scope.row)">
                                    下载RDP连接文件
                                </el-button>
                                <el-button v-else-if="scope.row.connType === 'ssh'" type="danger" size="small" @click="openXshell(currentItem, scope.row)">
                                    下载SSH连接文件
                                </el-button>
                                <el-button v-else-if="scope.row.connType === 'smb'" type="warning" size="small" @click="downloadSMB(currentItem, scope.row)">
                                    下载SMB连接文件
                                </el-button>
                                <el-button v-else-if="scope.row.connType === 'link'" type="success" size="small" @click="openLink(scope.row)">
                                    打开Web链接
                                </el-button>
                                <span v-else>-</span>
                            </template>
                        </el-table-column>
                        <el-table-column v-if="editMode" label="操作" width="200px">
                            <template #default="scope">
                                <el-button type="primary"  @click="saveConnection(currentItem.node, scope.row)">
                                    保存
                                </el-button>
                                <el-button type="danger"  @click="confirmDeleteConnection(currentItem.type, scope.row, scope.$index)"
                                           v-if="scope.row.id">删除
                                </el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                </template>

                <!-- 虚拟机信息 -->
                <template v-else-if="currentItem">
                    <el-descriptions title="虚拟机信息" :column="4">
                        <el-descriptions-item label="虚拟机ID">{{ currentItem.vmid }}</el-descriptions-item>
                        <el-descriptions-item label="节点">{{ currentItem.node }}</el-descriptions-item>
                        <el-descriptions-item label="类型">{{ currentItem.type === 'qemu' ? 'KVM' : 'LXC' }}
                        </el-descriptions-item>
                        <el-descriptions-item label="状态">
                            <el-tag v-if="currentItem.status === 'running'" type="success">{{ currentItem.status }}</el-tag>
                            <el-tag v-else-if="currentItem.status === 'stopped'" type="info">{{ currentItem.status }}</el-tag>
                            <el-tag v-else type="danger">{{ currentItem.status }}</el-tag>
                        </el-descriptions-item>
                        <el-descriptions-item label="CPU">{{ currentItem.cpus }} 核</el-descriptions-item>
                        <el-descriptions-item label="CPU使用率">{{ currentItem.cpuUsageFormatted }}
                        </el-descriptions-item>
                        <el-descriptions-item label="内存">{{ currentItem.memFormatted }} / {{ currentItem.maxmemFormatted }} GB
                        </el-descriptions-item>
                        <el-descriptions-item label="磁盘">{{ currentItem.diskFormatted }} / {{ currentItem.maxdiskFormatted }} GB
                        </el-descriptions-item>
                        <el-descriptions-item label="运行时长">{{ currentItem.uptimeFormatted }}
                        </el-descriptions-item>
                        <el-descriptions-item label="标签" :span="3">
                            <el-tag v-for="tag in parseTags(currentItem.tags)" :key="tag" style="margin-right: 5px">{{ tag }}
                            </el-tag>
                            <span v-if="!currentItem.tags || currentItem.tags === ''">-</span>
                        </el-descriptions-item>
                        <el-descriptions-item label="备注" :span="3">{{ currentItem.description || '-' }}
                        </el-descriptions-item>
                    </el-descriptions>

                    <!-- 说明 -->
                    <div v-if="editMode || currentExplain">
                        <div class="section-title">说明</div>
                        <div v-if="!editMode" style="padding: 10px; background: #ffffff; min-height: 100px; white-space: pre-wrap; font-size: 13px;">
                            {{ currentExplain }}
                        </div>
                        <el-input
                                v-else
                                v-model="currentExplain"
                                type="textarea"
                                :rows="4"
                                placeholder="请输入虚拟机说明"
                                @blur="saveExplain(currentItem.vmid, 'vm')"
                        ></el-input>
                    </div>

                    <!-- 连接信息 -->
                    <div class="section-title">
                        连接信息
                        <el-button v-if="editMode" type="primary"  @click="addConnection" style="margin-left: 10px">
                            添加连接
                        </el-button>
                    </div>
                    <el-table :data="connections" style="width: 100%;"
                              @cell-mouse-enter="(row, column, cell, event) => { if (column.property === 'password') hoveredRowId = connections.indexOf(row); }"
                              @cell-mouse-leave="(row, column, cell, event) => { if (column.property === 'password') hoveredRowId = null; }">
                        <el-table-column label="名称" width="200px" prop="name">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.name || '-' }}</span>
                                <el-input v-else v-model="scope.row.name" ></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="类型" width="100px" prop="connType">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.connType || '-' }}</span>
                                <el-select v-else v-model="scope.row.connType" placeholder="请选择" @change="handleTypeChange(scope.row)">
                                    <el-option label="RDP" value="rdp"></el-option>
                                    <el-option label="SSH" value="ssh"></el-option>
                                    <el-option label="SMB" value="smb"></el-option>
                                    <el-option label="链接" value="link"></el-option>
                                    <el-option label="其他" value="other"></el-option>
                                </el-select>
                            </template>
                        </el-table-column>
                        <el-table-column label="地址" width="300px" prop="address">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.address || '-' }}</span>
                                <el-input v-else v-model="scope.row.address"
                                          @blur="validateIP(scope.row)"></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="端口" width="100px" prop="port">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.port || '-' }}</span>
                                <el-input v-else v-model.number="scope.row.port"
                                          :disabled="scope.row.connType === 'smb'"
                                          @blur="validatePort(scope.row)"></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="用户名" prop="username">
                            <template #default="scope">
                                <span v-if="!editMode">{{ scope.row.username || '-' }}</span>
                                <el-input v-else v-model="scope.row.username" ></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="密码" prop="password">
                            <template #default="scope">
                                <span v-if="!editMode">
                                    <span v-if="hoveredRowId === scope.$index">{{ scope.row.password || '-' }}</span>
                                    <span v-else>{{ scope.row.password ? '******' : '-' }}</span>
                                </span>
                                <el-input v-else v-model="scope.row.password" ></el-input>
                            </template>
                        </el-table-column>
                        <el-table-column label="快捷连接" width="150px">
                            <template #default="scope">
                                <el-button v-if="scope.row.connType === 'rdp'" type="primary" size="small" @click="downloadRDP(currentItem, scope.row)">
                                    下载RDP连接文件
                                </el-button>
                                <el-button v-else-if="scope.row.connType === 'ssh'" type="danger" size="small" @click="openXshell(currentItem, scope.row)">
                                    下载SSH连接文件
                                </el-button>
                                <el-button v-else-if="scope.row.connType === 'smb'" type="warning" size="small" @click="downloadSMB(currentItem, scope.row)">
                                    下载SMB连接文件
                                </el-button>
                                <el-button v-else-if="scope.row.connType === 'link'" type="success" size="small" @click="openLink(scope.row)">
                                    打开Web链接
                                </el-button>
                                <span v-else>-</span>
                            </template>
                        </el-table-column>
                        <el-table-column v-if="editMode" label="操作" width="200px">
                            <template #default="scope">
                                <el-button type="primary"  @click="saveConnection(currentItem.vmid, scope.row)">
                                    保存
                                </el-button>
                                <el-button type="danger"  @click="confirmDeleteConnection(currentItem.type, scope.row, scope.$index)"
                                           v-if="scope.row.id">删除
                                </el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                </template>
                </el-main>
            </el-container>
        </el-main>

        <!-- 设置对话框 -->
        <el-dialog v-model="settingsDialogVisible" title="系统设置" width="600px" :close-on-click-modal="false">
            <el-form :model="settings" label-width="120px">
                <el-form-item label="PVE IP地址">
                    <el-input v-model="settings.pve_ip" placeholder="例如: 192.168.1.100"></el-input>
                </el-form-item>
                <el-form-item label="PVE 端口">
                    <el-input v-model="settings.pve_port" placeholder="默认: 8006"></el-input>
                </el-form-item>
                <el-form-item label="PVE 用户名">
                    <el-input v-model="settings.pve_username" placeholder="例如: root@pam"></el-input>
                </el-form-item>
                <el-form-item label="PVE 密码">
                    <el-input v-model="settings.pve_password" type="password" placeholder="请输入密码" show-password></el-input>
                </el-form-item>
                <el-form-item label="菜单显示备注">
                    <el-switch v-model="settings.menu_show_description_bool" active-text="显示" inactive-text="隐藏"></el-switch>
                </el-form-item>
            </el-form>
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="settingsDialogVisible = false">取消</el-button>
                    <el-button type="primary" @click="saveSettings">保存</el-button>
                </span>
            </template>
        </el-dialog>
    </el-container>
</div>

<script src="/js/vue.global.js"></script>
<script src="/js/element-plus.js"></script>
<script src="/js/element-plus-icons.js"></script>
<script>
    const {createApp, ref, computed, onMounted, watch} = Vue;
    const {ElMessage, ElMessageBox, ElLoading} = ElementPlus;

    const app = createApp({
        setup() {
            const vms = ref([]);
            const hosts = ref([]);
            const allItems = ref([]);
            const activeTab = ref('');
            const errorMessage = ref('');
            const currentExplain = ref('');
            const connections = ref([]);
            const editMode = ref(false);
            const hoveredRowId = ref(null);
            const loading = ref(false);

            // 设置相关
            const settingsDialogVisible = ref(false);
            const settings = ref({
                pve_ip: '',
                pve_port: '8006',
                pve_username: '',
                pve_password: '',
                menu_show_description: '1',
                menu_show_description_bool: true
            });
            const showDescription = ref(true);

            const currentItem = computed(() => {
                if (!activeTab.value || allItems.value.length === 0) return null;
                return allItems.value.find(item => {
                    if (item.type === 'host') {
                        return `host-${item.node}` === activeTab.value;
                    } else {
                        return String(item.vmid) === activeTab.value;
                    }
                });
            });

            const parseTags = (tags) => {
                if (!tags || tags === '') return [];
                return tags.split(';').filter(tag => tag.trim() !== '').map(tag => tag.trim());
            };

            const loadData = async () => {
                const loadingInstance = ElLoading.service({
                    lock: true,
                    text: '加载中...',
                    background: 'rgba(0, 0, 0, 0.7)',
                });

                try {
                    const response = await fetch('/api/data');
                    if (!response.ok) {
                        throw new Error('网络响应失败');
                    }
                    const data = await response.json();

                    if (data.error) {
                        errorMessage.value = data.error;
                        return;
                    }

                    hosts.value = data.hosts || [];
                    vms.value = data.vms || [];

                    if (data.vms && data.vms.length > 0) {
                        const statusPriority = {
                            'running': 1,
                            'stopped': 2,
                            'lost': 3
                        };

                        data.vms.sort((a, b) => {
                            const priorityA = statusPriority[a.status] || 999;
                            const priorityB = statusPriority[b.status] || 999;
                            return priorityA - priorityB;
                        });
                    }

                    allItems.value = [...hosts.value, ...vms.value];

                    if (allItems.value.length > 0) {
                        const firstItem = allItems.value[0];
                        activeTab.value = firstItem.type === 'host' ? `host-${firstItem.node}` : String(firstItem.vmid);
                        await loadVmData(firstItem);
                    }
                } catch (error) {
                    errorMessage.value = '加载数据失败: ' + error.message;
                } finally {
                    loadingInstance.close();
                }
            };

            const loadVmData = async (item) => {
                if (item.type === 'host') {
                    const node = item.node;
                    await loadExplain(node, 'host');
                    await loadConnections(node, 'host');
                } else {
                    const vmid = item.vmid;
                    await loadExplain(vmid, 'vm');
                    await loadConnections(vmid, 'vm');
                }
            };

            const loadExplain = async (id, type) => {
                try {
                    const url = type === 'host' ? `/api/host/${id}/explain` : `/api/vm/${id}/explain`;
                    const response = await fetch(url);
                    const data = await response.json();
                    currentExplain.value = data.explain || '';
                } catch (error) {
                    console.error('加载说明失败', error);
                }
            };

            const saveExplain = async (id, type) => {
                if (!editMode.value) return;
                try {
                    const url = type === 'host' ? `/api/host/${id}/explain` : `/api/vm/${id}/explain`;
                    await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({explain: currentExplain.value})
                    });
                    ElMessage.success('保存成功');
                } catch (error) {
                    ElMessage.error('保存失败');
                }
            };

            const loadConnections = async (id, type) => {
                try {
                    const url = type === 'host' ? `/api/host/${id}/connections` : `/api/vm/${id}/connections`;
                    const response = await fetch(url);
                    connections.value = await response.json();
                } catch (error) {
                    console.error('加载连接信息失败', error);
                    connections.value = [];
                }
            };

            const addConnection = () => {
                connections.value.push({
                    name: '',
                    connType: 'rdp',
                    address: '',
                    port: 3389,
                    username: '',
                    password: ''
                });
            };

            const handleTypeChange = (row) => {
                if (row.connType === 'rdp') {
                    row.port = 3389;
                } else if (row.connType === 'ssh') {
                    row.port = 22;
                } else if (row.connType === 'smb') {
                    row.port = 455;
                } else {
                    row.port = null;
                }
            };

            const validateIP = (row) => {
                const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
                if (row.address && !ipPattern.test(row.address)) {
                    ElMessage.warning('请输入有效的IP地址');
                }
            };

            const validatePort = (row) => {
                if (row.port && (isNaN(row.port) || row.port < 1 || row.port > 65535)) {
                    ElMessage.warning('端口必须是1-65535之间的数字');
                    row.port = null;
                }
            };

            const saveConnection = async (id, connection) => {
                if (!connection.connType) {
                    ElMessage.warning('请选择连接类型');
                    return;
                }

                const type = typeof id === 'string' ? 'host' : 'vm';
                const url = type === 'host' ? `/api/host/${id}/connections` : `/api/vm/${id}/connections`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(connection)
                    });
                    const result = await response.json();
                    if (result.success) {
                        ElMessage.success('保存成功');
                        await loadConnections(id, type);
                    }
                } catch (error) {
                    ElMessage.error('保存失败');
                }
            };

            const confirmDeleteConnection = async (itemType, connection, index) => {
                try {
                    await ElMessageBox.confirm(
                        '确认要删除这条连接信息吗？',
                        '删除确认',
                        {
                            confirmButtonText: '确定',
                            cancelButtonText: '取消',
                            type: 'warning',
                        }
                    );
                    await deleteConnection(itemType, connection, index);
                } catch {
                    // 用户取消删除
                }
            };

            const deleteConnection = async (itemType, connection, index) => {
                if (connection.id) {
                    const url = itemType === 'host' ? `/api/host/connections/${connection.id}` : `/api/connections/${connection.id}`;
                    try {
                        const response = await fetch(url, {
                            method: 'DELETE'
                        });
                        const result = await response.json();
                        if (result.success) {
                            ElMessage.success('删除成功');
                            connections.value.splice(index, 1);
                        }
                    } catch (error) {
                        ElMessage.error('删除失败');
                    }
                } else {
                    connections.value.splice(index, 1);
                }
            };

            const downloadRDP = (item, connection) => {
                if (!connection.address) {
                    ElMessage.warning('请先设置地址');
                    return;
                }

                const rdpContent = `screen mode id:i:2
use multimon:i:0
desktopwidth:i:1920
desktopheight:i:1080
session bpp:i:32
winposstr:s:0,3,0,0,800,600
compression:i:1
keyboardhook:i:2
audiocapturemode:i:0
videoplaybackmode:i:1
connection type:i:7
networkautodetect:i:1
bandwidthautodetect:i:1
displayconnectionbar:i:1
enableworkspacereconnect:i:0
disable wallpaper:i:0
allow font smoothing:i:0
allow desktop composition:i:0
disable full window drag:i:1
disable menu anims:i:1
disable themes:i:0
disable cursor setting:i:0
bitmapcachepersistenable:i:1
full address:s:${connection.address}:${connection.port || 3389}
audiomode:i:0
redirectprinters:i:1
redirectcomports:i:0
redirectsmartcards:i:1
redirectclipboard:i:1
redirectposdevices:i:0
autoreconnection enabled:i:1
authentication level:i:2
prompt for credentials:i:0
negotiate security layer:i:1
remoteapplicationmode:i:0
alternate shell:s:
shell working directory:s:
gatewayhostname:s:
gatewayusagemethod:i:4
gatewaycredentialssource:i:4
gatewayprofileusagemethod:i:0
promptcredentialonce:i:0
gatewaybrokeringtype:i:0
use redirection server name:i:0
rdgiskdcproxy:i:0
kdcproxyname:s:
${connection.username ? 'username:s:' + connection.username : ''}`;

                const itemName = item.type === 'host' ? item.node : item.name;
                const blob = new Blob([rdpContent], { type: 'application/x-rdp' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${itemName}-${connection.address}-RDP.rdp`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                ElMessage.success('RDP文件已下载');
            };

            const openXshell = (item, connection) => {
                if (!connection.address) {
                    ElMessage.warning('请先设置地址');
                    return;
                }

                const port = connection.port || 22;
                const username = connection.username || 'root';
                const password = connection.password || '';

                const batContent = `@echo off\r\nXshell.exe -url ssh://${username}:${password}@${connection.address}:${port}\r\n`;

                const itemName = item.type === 'host' ? item.node : item.name;
                const blob = new Blob([batContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${itemName}-${connection.address}-SSH.bat`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                if (!password) {
                    ElMessage.warning('SSH批处理脚本已下载，但未设置密码');
                } else {
                    ElMessage.success('SSH批处理脚本已下载，双击运行即可使用Xshell连接');
                }
            };

            const downloadSMB = (item, connection) => {
                if (!connection.address) {
                    ElMessage.warning('请先设置地址');
                    return;
                }

                const username = connection.username || '';
                const password = connection.password || '';
                const itemName = item.type === 'host' ? item.node : item.name;

                let batContent = '@echo off\r\n';

                if (username && password) {
                    batContent += `cmdkey /add:${connection.address} /user:${username} /pass:${password}\r\n`;
                    batContent += `net use \\\\${connection.address} /user:"${username}" "${password}" /persistent:no\r\n`;
                } else if (username) {
                    batContent += `net use \\\\${connection.address} /user:"${username}" /persistent:no\r\n`;
                } else {
                    batContent += `net use \\\\${connection.address} /persistent:no\r\n`;
                }

                batContent += `start \\\\${connection.address}\r\n`;

                const blob = new Blob([batContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${itemName}-${connection.address}-SMB.bat`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                if (!username || !password) {
                    ElMessage.warning('SMB连接文件已下载，但未设置用户名或密码');
                } else {
                    ElMessage.success('SMB连接文件已下载，双击运行即可连接到共享文件夹');
                }
            };

            const openLink = (connection) => {
                if (!connection.address) {
                    ElMessage.warning('请先设置地址');
                    return;
                }

                let url = connection.address;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'http://' + url ;
                }

                let port = connection.port;
                if (port) {
                    url = url + ":" + port
                }

                window.open(url, '_blank');
            };

            const handleTabChange = async (tabKey) => {
                if (loading.value) return;

                activeTab.value = tabKey;

                const item = allItems.value.find(i => {
                    if (i.type === 'host') {
                        return `host-${i.node}` === tabKey;
                    } else {
                        return String(i.vmid) === tabKey;
                    }
                });

                if (item) {
                    await loadVmData(item);
                }
            };

            const toggleEditMode = async () => {
                if (!editMode.value) {
                    try {
                        await ElMessageBox.confirm(
                            '确认要进入编辑模式吗？',
                            '提示',
                            {
                                confirmButtonText: '确定',
                                cancelButtonText: '取消',
                                type: 'warning',
                            }
                        );
                        editMode.value = true;
                        ElMessage.success('已进入编辑模式');
                    } catch {
                    }
                } else {
                    editMode.value = false;
                    ElMessage.info('已退出编辑模式');
                }
            };

            const loadConfig = async () => {
                try {
                    const response = await fetch('/api/config');
                    const result = await response.json();
                    if (result.success && result.data) {
                        settings.value = {
                            pve_ip: result.data.pve_ip || '',
                            pve_port: result.data.pve_port || '8006',
                            pve_username: result.data.pve_username || '',
                            pve_password: result.data.pve_password || '',
                            menu_show_description: result.data.menu_show_description || '1',
                            menu_show_description_bool: result.data.menu_show_description === '1'
                        };
                    }
                } catch (error) {
                    console.error('加载配置失败', error);
                }
            };

            const showSettingsDialog = async () => {
                await loadConfig();
                settingsDialogVisible.value = true;
            };

            const saveSettings = async () => {
                try {
                    const configData = {
                        pve_ip: settings.value.pve_ip,
                        pve_port: settings.value.pve_port,
                        pve_username: settings.value.pve_username,
                        pve_password: settings.value.pve_password,
                        menu_show_description: settings.value.menu_show_description_bool ? '1' : '0'
                    };

                    const response = await fetch('/api/config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(configData)
                    });

                    const result = await response.json();
                    if (result.success) {
                        ElMessage.success(result.message || '配置保存成功');
                        settingsDialogVisible.value = false;
                        setTimeout(() => window.location.reload(), 500);
                    } else {
                        ElMessage.error(result.error || '保存失败');
                    }
                } catch (error) {
                    ElMessage.error('保存配置失败: ' + error.message);
                }
            };

            const checkFirstRun = async () => {
                try {
                    const response = await fetch('/api/config/first-run');
                    const result = await response.json();
                    if (result.success && result.firstRun) {
                        await showSettingsDialog();
                    }
                } catch (error) {
                    console.error('检查首次运行失败', error);
                }
            };

            const loadMenuDisplaySetting = async () => {
                try {
                    const response = await fetch('/api/config/menu-show-description');
                    const result = await response.json();
                    if (result.success) {
                        showDescription.value = result.showDescription;
                    }
                } catch (error) {
                    console.error('加载菜单显示设置失败', error);
                }
            };

            onMounted(() => {
                checkFirstRun();
                loadMenuDisplaySetting();
                loadData();
            });

            return {
                vms,
                hosts,
                allItems,
                currentItem,
                activeTab,
                errorMessage,
                currentExplain,
                connections,
                editMode,
                hoveredRowId,
                loading,
                settingsDialogVisible,
                settings,
                showDescription,
                parseTags,
                saveExplain,
                addConnection,
                handleTypeChange,
                validateIP,
                validatePort,
                saveConnection,
                confirmDeleteConnection,
                deleteConnection,
                downloadRDP,
                openXshell,
                downloadSMB,
                openLink,
                handleTabChange,
                toggleEditMode,
                showSettingsDialog,
                saveSettings
            };
        }
    });

    // 注册 Element Plus Icons
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
        app.component(key, component);
    }

    app.use(ElementPlus).mount('#app');
</script>
</body>
</html>
