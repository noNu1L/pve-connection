version: '3'
services:
  pve-connection:
    image: eclipse-temurin:17-jre-jammy
    container_name: pve-connection
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      - APP_DATA_DIR=/data
    entrypoint:
      java -jar -Xms1024M -XX:MetaspaceSize=1024m  -XX:MaxMetaspaceSize=512m -Xss2m /pve-connection.jar
    volumes:
      - ./pve-connection.jar:/pve-connection.jar
      - ./data:/data
